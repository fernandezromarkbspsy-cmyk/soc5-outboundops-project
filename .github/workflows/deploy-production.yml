name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Run deployment through Systems Manager
        env:
          INSTANCE_ID: ${{ secrets.AWS_EC2_INSTANCE_ID }}
        shell: bash
        run: |
          set -Eeuo pipefail

          parameters=$(jq -n \
            --arg command "sudo -u ubuntu bash /opt/soc5-outbound/deploy/deploy-production.sh" \
            '{commands: [$command], executionTimeout: ["1800"]}')

          command_id=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy $GITHUB_SHA" \
            --parameters "$parameters" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command: $command_id"

          set +e
          aws ssm wait command-executed \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID"
          waiter_status=$?
          set -e

          invocation=$(aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID")

          echo "$invocation" | jq -r '.StandardOutputContent'
          echo "$invocation" | jq -r '.StandardErrorContent' >&2

          status=$(echo "$invocation" | jq -r '.Status')
          if [[ "$waiter_status" -ne 0 || "$status" != "Success" ]]; then
            echo "Deployment failed with SSM status: $status" >&2
            exit 1
          fi
