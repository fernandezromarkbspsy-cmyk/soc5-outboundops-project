name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45

    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Run deployment through Systems Manager
        env:
          INSTANCE_ID: ${{ secrets.AWS_EC2_INSTANCE_ID }}
        shell: bash
        run: |
          set -Eeuo pipefail

          read -r -d '' remote_command <<'REMOTE_COMMAND' || true
          # AWS-RunShellScript executes this payload with /bin/sh.
          set -eu
          export DEBIAN_FRONTEND=noninteractive

          packages=""
          command -v aws >/dev/null 2>&1 || packages="$packages awscli"
          command -v docker >/dev/null 2>&1 || packages="$packages docker.io"

          if ! docker compose version >/dev/null 2>&1; then
            apt-get update
            if apt-cache show docker-compose-v2 >/dev/null 2>&1; then
              packages="$packages docker-compose-v2"
            elif apt-cache show docker-compose-plugin >/dev/null 2>&1; then
              packages="$packages docker-compose-plugin"
            else
              echo "Docker Compose v2 is unavailable from the configured APT repositories." >&2
              exit 1
            fi
          fi

          if [ -n "$packages" ]; then
            apt-get update
            set -- $packages
            apt-get install -y "$@"
          fi

          systemctl enable --now docker
          usermod -aG docker ubuntu
          sudo -u ubuntu -H bash /opt/soc5-outbound/deploy/deploy-production.sh
          REMOTE_COMMAND

          parameters=$(jq -n \
            --arg command "$remote_command" \
            '{commands: [$command], executionTimeout: ["2400"]}')

          command_id=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy $GITHUB_SHA" \
            --parameters "$parameters" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command: $command_id"

          # The built-in command-executed waiter gives up after a short fixed
          # number of attempts even though the remote command is still active.
          # Poll until SSM reports a terminal state so a workflow rerun cannot
          # overlap an orphaned deployment command.
          status="Pending"
          for attempt in {1..480}; do
            status=$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            case "$status" in
              Success|Cancelled|TimedOut|Failed|Cancelling)
                break
                ;;
            esac

            if (( attempt % 12 == 0 )); then
              echo "SSM deployment is still $status ($((attempt * 5)) seconds elapsed)..."
            fi
            sleep 5
          done

          invocation=$(aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID")

          echo "$invocation" | jq -r '.StandardOutputContent'
          echo "$invocation" | jq -r '.StandardErrorContent' >&2

          status=$(echo "$invocation" | jq -r '.Status')
          if [[ "$status" != "Success" ]]; then
            echo "$invocation" | jq -r '
              "Deployment failed with SSM status: \(.Status)",
              "Status details: \(.StatusDetails // "not provided")",
              "Response code: \(.ResponseCode // "not provided")",
              "Execution: \(.ExecutionStartDateTime // "unknown") to \(.ExecutionEndDateTime // "unknown")"
            ' >&2
            exit 1
          fi
