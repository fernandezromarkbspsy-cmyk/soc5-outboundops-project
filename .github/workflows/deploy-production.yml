name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45

    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Run deployment through Systems Manager
        env:
          INSTANCE_ID: ${{ secrets.AWS_EC2_INSTANCE_ID }}
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Checking SSM agent status on instance..."
          ssm_status=$(aws ssm describe-instance-information \
            --instance-information-filter-list "key=InstanceIds,valueSet=$INSTANCE_ID" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text 2>/dev/null || echo "Offline")

          if [[ "$ssm_status" != "Online" ]]; then
            echo "SSM agent is not online (status: $ssm_status). Restarting SSM agent..."
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name AWS-RunShellScript \
              --parameters 'commands=["sudo systemctl restart amazon-ssm-agent"]' \
              --comment "Restart SSM agent before deployment" \
              --query 'Command.CommandId' \
              --output text > /tmp/restart_command_id.txt

            restart_command_id=$(cat /tmp/restart_command_id.txt)
            echo "SSM restart command: $restart_command_id"

            # Wait for restart to complete
            for attempt in {1..30}; do
              restart_status=$(aws ssm get-command-invocation \
                --command-id "$restart_command_id" \
                --instance-id "$INSTANCE_ID" \
                --query 'Status' \
                --output text 2>/dev/null || echo "Pending")

              if [[ "$restart_status" == "Success" || "$restart_status" == "Failed" ]]; then
                break
              fi
              sleep 2
            done

            echo "Waiting for SSM agent to come back online..."
            for attempt in {1..60}; do
              ssm_status=$(aws ssm describe-instance-information \
                --instance-information-filter-list "key=InstanceIds,valueSet=$INSTANCE_ID" \
                --query 'InstanceInformationList[0].PingStatus' \
                --output text 2>/dev/null || echo "Offline")

              if [[ "$ssm_status" == "Online" ]]; then
                echo "SSM agent is now online."
                break
              fi
              if (( attempt == 60 )); then
                echo "SSM agent failed to come back online after restart." >&2
                exit 1
              fi
              sleep 5
            done
          fi

          parameters=$(jq -n \
            --arg command "if ! command -v aws >/dev/null 2>&1; then apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y awscli; fi; sudo -u ubuntu bash /opt/soc5-outbound/deploy/deploy-production.sh" \
            '{commands: [$command], executionTimeout: ["3600"]}')

          command_id=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy $GITHUB_SHA" \
            --parameters "$parameters" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command: $command_id"

          # The built-in command-executed waiter gives up after a short fixed
          # number of attempts even though the remote command is still active.
          # Poll until SSM reports a terminal state so a workflow rerun cannot
          # overlap an orphaned deployment command.
          status="Pending"
          for attempt in {1..720}; do
            status=$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            case "$status" in
              Success|Cancelled|TimedOut|Failed|Cancelling)
                break
                ;;
            esac

            if (( attempt % 12 == 0 )); then
              echo "SSM deployment is still $status ($((attempt * 5)) seconds elapsed)..."
            fi
            sleep 5
          done

          invocation=$(aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID")

          echo "$invocation" | jq -r '.StandardOutputContent'
          echo "$invocation" | jq -r '.StandardErrorContent' >&2

          status=$(echo "$invocation" | jq -r '.Status')
          if [[ "$status" != "Success" ]]; then
            echo "Deployment failed with SSM status: $status" >&2
            exit 1
          fi
