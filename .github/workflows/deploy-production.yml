name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45

    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Run deployment through Systems Manager
        env:
          INSTANCE_ID: ${{ secrets.AWS_EC2_INSTANCE_ID }}
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Instance ID: $INSTANCE_ID"
          echo "AWS Region: ap-southeast-1"
          
          echo "Verifying instance exists in EC2..."
          if ! aws ec2 describe-instances --instance-ids "$INSTANCE_ID" --query 'Reservations[0].Instances[0].State.Name' --output text 2>/dev/null; then
            echo "Error: Instance $INSTANCE_ID does not exist or is not accessible." >&2
            echo "Please verify the AWS_EC2_INSTANCE_ID secret is correct." >&2
            exit 1
          fi

          echo "Checking SSM agent status on instance..."
          ssm_info=$(aws ssm describe-instance-information \
            --instance-information-filter-list "key=InstanceIds,valueSet=$INSTANCE_ID" \
            --query 'InstanceInformationList[0]' \
            --output json 2>/dev/null || echo "null")
          
          if [[ "$ssm_info" == "null" ]]; then
            echo "Error: Could not retrieve instance information from SSM." >&2
            echo "Instance ID: $INSTANCE_ID" >&2
            echo "This usually means:" >&2
            echo "  1. SSM agent is not installed on the instance" >&2
            echo "  2. Instance does not have the SSM IAM role attached" >&2
            echo "  3. Instance is in a private subnet without SSM VPC endpoint" >&2
            echo "  4. Security groups are blocking SSM traffic" >&2
            echo "" >&2
            echo "Attempting to list all SSM-managed instances for debugging..." >&2
            aws ssm describe-instance-information --query 'InstanceInformationList[*].[InstanceId,PlatformType,PingStatus]' --output table 2>/dev/null || echo "No SSM-managed instances found." >&2
            exit 1
          fi

          ssm_status=$(echo "$ssm_info" | jq -r '.PingStatus // "Offline"')
          ssm_platform_type=$(echo "$ssm_info" | jq -r '.PlatformType // "Unknown"')
          ssm_agent_version=$(echo "$ssm_info" | jq -r '.AgentVersion // "Unknown"')

          echo "SSM Status: $ssm_status"
          echo "Platform: $ssm_platform_type"
          echo "Agent Version: $ssm_agent_version"

          if [[ "$ssm_status" != "Online" ]]; then
            echo "SSM agent is not online (status: $ssm_status)." >&2
            echo "Attempting to restart instance to recover SSM agent..." >&2
            if ! aws ec2 reboot-instances --instance-ids "$INSTANCE_ID"; then
              echo "Failed to reboot instance." >&2
              exit 1
            fi
            echo "Waiting for instance to reboot and SSM agent to come back online..."
            for attempt in {1..60}; do
              ssm_status=$(aws ssm describe-instance-information \
                --instance-information-filter-list "key=InstanceIds,valueSet=$INSTANCE_ID" \
                --query 'InstanceInformationList[0].PingStatus' \
                --output text 2>/dev/null || echo "Offline")

              if [[ "$ssm_status" == "Online" ]]; then
                echo "SSM agent is now online after $((attempt * 10)) seconds."
                break
              fi
              if (( attempt % 6 == 0 )); then
                echo "Still waiting for SSM agent... ($((attempt * 10)) seconds elapsed)"
              fi
              if (( attempt == 60 )); then
                echo "SSM agent failed to come back online after instance reboot." >&2
                echo "Manual intervention required: SSH into instance and restart SSM agent." >&2
                exit 1
              fi
              sleep 10
            done
          fi

          parameters=$(jq -n \
            --arg command "if ! command -v aws >/dev/null 2>&1; then apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y awscli; fi; sudo -u ubuntu bash /opt/soc5-outbound/deploy/deploy-production.sh" \
            '{commands: [$command], executionTimeout: ["3600"]}')

          command_id=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy $GITHUB_SHA" \
            --parameters "$parameters" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command: $command_id"

          # The built-in command-executed waiter gives up after a short fixed
          # number of attempts even though the remote command is still active.
          # Poll until SSM reports a terminal state so a workflow rerun cannot
          # overlap an orphaned deployment command.
          status="Pending"
          for attempt in {1..720}; do
            status=$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            case "$status" in
              Success|Cancelled|TimedOut|Failed|Cancelling)
                break
                ;;
            esac

            if (( attempt % 12 == 0 )); then
              echo "SSM deployment is still $status ($((attempt * 5)) seconds elapsed)..."
            fi
            sleep 5
          done

          invocation=$(aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID")

          echo "$invocation" | jq -r '.StandardOutputContent'
          echo "$invocation" | jq -r '.StandardErrorContent' >&2

          status=$(echo "$invocation" | jq -r '.Status')
          if [[ "$status" != "Success" ]]; then
            echo "Deployment failed with SSM status: $status" >&2
            exit 1
          fi
