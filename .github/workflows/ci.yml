name: CI
on: [push, pull_request]
jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: frontend}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json}
      - run: npm ci
      - run: npm run build
  backend:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: backend}}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: {php-version: '8.3', coverage: none}
      - run: composer install --no-interaction --prefer-dist
      - run: cp .env.example .env
      - run: vendor/bin/pint --test
      - run: php artisan key:generate --force
      - run: php artisan test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t soc5-backend ./backend
      - run: docker build --build-arg VITE_API_URL=/api --build-arg VITE_SUPABASE_URL=https://placeholder.supabase.co --build-arg VITE_SUPABASE_PUBLISHABLE_KEY=placeholder -t soc5-frontend ./frontend
