name: CI
on: [push, pull_request]
jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: frontend}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json}
      - run: npm ci
      - run: npm run build
  backend:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: backend}}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: {php-version: '8.3', coverage: none}
      - run: composer install --no-interaction --prefer-dist
      - run: vendor/bin/pint --test
  docker:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
    steps:
      - uses: actions/checkout@v4
      - name: Create backend env file for Compose validation
        run: cp backend/.env.example backend/.env
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build backend image
        run: docker build ./backend
      - name: Build frontend image
        run: |
          docker build ./frontend \
            --build-arg VITE_API_URL=/api \
            --build-arg VITE_SUPABASE_URL="$SUPABASE_URL" \
            --build-arg VITE_SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY"
